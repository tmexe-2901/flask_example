name: CI
on: [push]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.12.0]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Setup Python
        run: uv python install ${{ matrix.python_version }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest
  code-quality:
    strategy:
      fail-fast: false
      matrix:
        python-version: [3.12.0]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Setup Python
        run: uv python install ${{ matrix.python_version }}
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run black
        run: uv run black . --check
      - name: Run isort
        run: uv run isort . --check-only --profile black
      - name: Run flake8
        run: uv run flake8 .
      - name: Run bandit
        run: uv run bandit .
      - name: Run saftey
        run: uv run safety check